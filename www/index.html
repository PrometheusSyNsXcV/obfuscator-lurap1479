<script>

// ═══════════════════════════════════════════
// JAROT VM PROTECTOR ENGINE — Pure JS port
// Lexer → Parser → Compiler → Serializer → Encrypt → Loader
// No external dependencies, runs instantly in browser
// ═══════════════════════════════════════════

// ── LEXER ──
const LUA_KW = new Set(['and','break','do','else','elseif','end','false','for',
  'function','goto','if','in','local','nil','not','or','repeat','return',
  'then','true','until','while']);

function tokenize(src) {
  const toks = [];
  let i = 0, line = 1;
  const peek = (o=0) => src[i+(o||0)] || '';
  const adv = (n=1) => { const s=src.slice(i,i+n); i+=n; return s; };
  const isEnd = () => i >= src.length;
  const addT = (t,v) => toks.push({type:t,value:v,line});

  const readStr = (q) => {
    let s='';
    while (!isEnd() && peek() !== q) {
      if (peek()==='\n') throw new Error('Unfinished string at line '+line);
      if (peek()==='\\') {
        adv();
        const e=adv();
        if(e==='n')s+='\n'; else if(e==='t')s+='\t'; else if(e==='r')s+='\r';
        else if(e==='"')s+='"'; else if(e==="'")s+="'"; else if(e==='\\')s+='\\';
        else if(/\d/.test(e)){let n=e;if(/\d/.test(peek()))n+=adv();if(/\d/.test(peek()))n+=adv();s+=String.fromCharCode(parseInt(n));}
        else s+=e;
      } else s+=adv();
    }
    if (isEnd()) throw new Error('Unfinished string');
    adv(); return s;
  };

  const checkLong = () => {
    if (peek()!=='[') return -1;
    let save=i; i++;
    let lv=0;
    while(peek()==='='){lv++;i++;}
    if(peek()==='['){i++;return lv;}
    i=save; return -1;
  };

  const readLong = (lv) => {
    if(peek()==='\n'){adv();line++;}
    const close=']'+'='.repeat(lv)+']';
    let s='';
    while(!isEnd()){
      if(src.slice(i,i+close.length)===close){i+=close.length;return s;}
      const c=adv();
      if(c==='\n')line++;
      s+=c;
    }
    throw new Error('Unfinished long string');
  };

  while (!isEnd()) {
    // skip whitespace & comments
    let skipped=true;
    while(skipped){
      skipped=false;
      while(!isEnd()&&' \t\r'.includes(peek())){adv();skipped=true;}
      if(peek()==='\n'){adv();line++;skipped=true;}
      if(peek()==='-'&&peek(1)==='-'){
        adv(2);
        if(peek()==='['){const lv=checkLong();if(lv>=0){readLong(lv);skipped=true;continue;}}
        while(!isEnd()&&peek()!=='\n')adv();
        skipped=true;
      }
    }
    if(isEnd())break;

    const c=peek(), ln=line;

    if(/\d/.test(c)||(c==='.'&&/\d/.test(peek(1)))){
      let s='',isH=false;
      if(c==='0'&&'xX'.includes(peek(1))){s+=adv(2);isH=true;while(!isEnd()&&/[0-9a-fA-F_]/.test(peek()))s+=adv();}
      else{while(!isEnd()&&/[\d_]/.test(peek()))s+=adv();if(peek()==='.'&&/\d/.test(peek(1))){s+=adv();while(!isEnd()&&/[\d_]/.test(peek()))s+=adv();}if(!isEnd()&&'eE'.includes(peek())){s+=adv();if('+-'.includes(peek()))s+=adv();while(!isEnd()&&/\d/.test(peek()))s+=adv();}}
      addT('NUMBER',parseFloat(s.replace(/_/g,''))); continue;
    }
    if(c==='"'||c==="'"){adv();addT('STRING',readStr(c));continue;}
    if(c==='['){const lv=checkLong();if(lv>=0){addT('STRING',readLong(lv));continue;}adv();addT('[','[');continue;}
    if(/[a-zA-Z_]/.test(c)){
      let s='';while(!isEnd()&&/[\w]/.test(peek()))s+=adv();
      addT(LUA_KW.has(s)?s:'NAME',s);continue;
    }
    // symbols
    adv();
    if(c==='+')addT('+','+');
    else if(c==='*')addT('*','*');
    else if(c==='%')addT('%','%');
    else if(c==='^')addT('^','^');
    else if(c==='#')addT('#','#');
    else if(c==='&')addT('&','&');
    else if(c==='|')addT('|','|');
    else if(c==='(')addT('(','(');
    else if(c===')')addT(')',')')
    else if(c==='{')addT('{','{');
    else if(c==='}')addT('}','}');
    else if(c===']')addT(']',']');
    else if(c===';')addT(';',';');
    else if(c===',')addT(',',',');
    else if(c==='-')addT('-','-');
    else if(c==='/'){if(peek()==='/')addT('//',adv());else addT('/','/');}
    else if(c==='~'){if(peek()==='=')addT('~=',adv());else addT('~','~');}
    else if(c==='<'){if(peek()==='<')addT('<<',adv());else if(peek()==='=')addT('<=',adv());else addT('<','<');}
    else if(c==='>'){if(peek()==='>')addT('>>',adv());else if(peek()==='=')addT('>=',adv());else addT('>','>');}
    else if(c==='='){if(peek()==='=')addT('==',adv());else addT('=','=');}
    else if(c===':'){if(peek()===':')addT('::',adv());else addT(':',':');}
    else if(c==='.'){if(peek()==='.')addT(peek(1)==='.'?'...':'..',peek()==='.'?peek(1)==='.'?adv(2):adv():'');else addT('.','.'); }
    else throw new Error("Unknown char '"+c+"' at line "+ln);
  }
  toks.push({type:'EOF',value:null,line});
  return toks;
}

// ── PARSER ──
function parse(toks) {
  let pos = 0;
  const peek = (o=0) => toks[pos+(o||0)] || {type:'EOF',value:null};
  const check = t => peek().type === t;
  const adv = () => { const t=toks[pos]; if(pos<toks.length)pos++; return t; };
  const expect = t => { const tk=peek(); if(tk.type!==t) throw new Error(`Expected '${t}' got '${tk.type}' at line ${tk.line}`); return adv(); };
  const match = (...ts) => { for(const t of ts)if(check(t))return adv(); return null; };
  const N = (tag,...a) => { const n={tag}; const flds={Block:['body'],Local:['names','values'],Assign:['targets','values'],Do:['body'],While:['cond','body'],Repeat:['body','cond'],If:['cond','then_','elseifs','else_'],ForNum:['var','from','to','step','body'],ForIn:['vars','iters','body'],Return:['values'],Goto:['label'],Label:['name'],FuncDef:['name','method','func'],LocalFunc:['name','func'],Call:['func','args'],MethodCall:['obj','method','args'],Number:['value'],String:['value'],Bool:['value'],Name:['name'],Field:['obj','field'],Index:['obj','key'],Binop:['op','left','right'],Unop:['op','operand'],Concat:['values'],Function:['params','has_vararg','body'],Table:['fields']}; (flds[tag]||[]).forEach((f,i)=>n[f]=a[i]); return n; };

  const STOP = new Set(['end','else','elseif','until','EOF']);
  const BPRIO = {'or':[1,1],'and':[2,2],'<':[3,3],'>':[3,3],'<=':[3,3],'>=':[3,3],'~=':[3,3],'==':[3,3],'|':[4,4],'~':[5,5],'&':[6,6],'<<':[7,7],'>>':[7,7],'..':[8,7],'+':[9,9],'-':[9,9],'*':[10,10],'/':[10,10],'//':[10,10],'%':[10,10],'^':[12,11]};
  const UNOPS = new Set(['-','not','#','~']);

  function parseBlock(){const s=[];while(!STOP.has(peek().type)){const st=parseStmt();if(st)s.push(st);match(';');if(st&&st.tag==='Return')break;}return N('Block',s);}
  function parseStmt(){const t=peek().type;if(t==='if')return parseIf();if(t==='while')return parseWhile();if(t==='do')return parseDo();if(t==='for')return parseFor();if(t==='repeat')return parseRepeat();if(t==='function')return parseFuncStat();if(t==='local')return parseLocal();if(t==='return')return parseReturn();if(t==='break'){adv();return N('Break');}if(t==='goto'){adv();return N('Goto',expect('NAME').value);}if(t==='::')return parseLabel();return parseExprStat();}
  function parseIf(){expect('if');const c=parseExpr();expect('then');const th=parseBlock();const ei=[];let el=null;while(check('elseif')){adv();const ec=parseExpr();expect('then');ei.push({cond:ec,body:parseBlock()});}if(match('else'))el=parseBlock();expect('end');return N('If',c,th,ei,el);}
  function parseWhile(){expect('while');const c=parseExpr();expect('do');const b=parseBlock();expect('end');return N('While',c,b);}
  function parseDo(){expect('do');const b=parseBlock();expect('end');return N('Do',b);}
  function parseFor(){expect('for');const nm=expect('NAME').value;if(check('=')){adv();const f=parseExpr();expect(',');const t=parseExpr();const s=match(',')?parseExpr():null;expect('do');const b=parseBlock();expect('end');return N('ForNum',nm,f,t,s,b);}const vs=[nm];while(match(','))vs.push(expect('NAME').value);expect('in');const it=parseExprList();expect('do');const b=parseBlock();expect('end');return N('ForIn',vs,it,b);}
  function parseRepeat(){expect('repeat');const b=parseBlock();expect('until');return N('Repeat',b,parseExpr());}
  function parseFuncStat(){expect('function');let nm=expect('NAME').value;let meth=null;while(match('.'))nm+='.'+expect('NAME').value;if(match(':'))meth=expect('NAME').value;return N('FuncDef',nm,meth,parseFuncBody(!!meth));}
  function parseLocal(){expect('local');if(check('function')){adv();const nm=expect('NAME').value;return N('LocalFunc',nm,parseFuncBody(false));}const ns=[expect('NAME').value];while(match(','))ns.push(expect('NAME').value);const vs=match('=')?parseExprList():[];return N('Local',ns,vs);}
  function parseReturn(){expect('return');const RSTOP=new Set(['end','else','elseif','until','EOF',';']);const vs=RSTOP.has(peek().type)?[]:parseExprList();match(';');return N('Return',vs);}
  function parseLabel(){expect('::');const nm=expect('NAME').value;expect('::');return N('Label',nm);}
  function parseExprStat(){const e=parseSuffix();if(check('=')||check(',')){const ts=[e];while(match(','))ts.push(parseSuffix());expect('=');return N('Assign',ts,parseExprList());}if(e.tag!=='Call'&&e.tag!=='MethodCall')throw new Error('Not a statement at line '+peek().line);return e;}
  function parseFuncBody(self){expect('(');const ps=[];let va=false;if(self)ps.push('self');if(!check(')')){if(check('...')){adv();va=true;}else{ps.push(expect('NAME').value);while(match(',')){if(check('...')){adv();va=true;break;}ps.push(expect('NAME').value);}}}expect(')');const b=parseBlock();expect('end');return N('Function',ps,va,b);}
  function parseExprList(){const l=[parseExpr()];while(match(','))l.push(parseExpr());return l;}
  function parseExpr(mp=0){let left=parseUnary();let p=BPRIO[peek().value||peek().type];while(p&&p[0]>mp){const op=adv().value;const r=parseExpr(p[1]);if(op==='..'){if(r.tag==='Concat'){r.values.unshift(left);left=r;}else left=N('Concat',[left,r]);}else left=N('Binop',op,left,r);p=BPRIO[peek().value||peek().type];}return left;}
  function parseUnary(){const t=peek();if(UNOPS.has(t.value||t.type)){const op=adv().value;return N('Unop',op,parseExpr(11));}return parseSuffix();}
  function parseSuffix(){let e=parsePrimary();while(true){if(check('.')){adv();e=N('Field',e,expect('NAME').value);}else if(check('[')){adv();const k=parseExpr();expect(']');e=N('Index',e,k);}else if(check(':')){adv();const m=expect('NAME').value;e=N('MethodCall',e,m,parseArgs());}else if(check('(')||check('{')||check('STRING')){e=N('Call',e,parseArgs());}else break;}return e;}
  function parseArgs(){if(check('(')){adv();const a=check(')')?[]:parseExprList();expect(')');return a;}if(check('{')){return[parseTable()];}const s=adv();return[N('String',s.value)];}
  function parsePrimary(){if(check('NAME')){return N('Name',adv().value);}if(match('(')){const e=parseExpr();expect(')');return e;}return parseSimple();}
  function parseSimple(){const t=peek();if(t.type==='NUMBER'){adv();return N('Number',t.value);}if(t.type==='STRING'){adv();return N('String',t.value);}if(t.type==='true'){adv();return N('Bool',true);}if(t.type==='false'){adv();return N('Bool',false);}if(t.type==='nil'){adv();return {tag:'Nil'};}if(t.type==='...'){adv();return {tag:'Vararg'};}if(t.type==='function'){adv();return parseFuncBody(false);}if(t.type==='{')return parseTable();throw new Error(`Unexpected '${t.type}' at line ${t.line}`);}
  function parseTable(){expect('{');const fs=[];while(!check('}')){if(check('[')&&peek(1).type!=='['){adv();const k=parseExpr();expect(']');expect('=');fs.push({type:'bracket',key:k,value:parseExpr()});}else if(check('NAME')&&toks[pos+1]&&toks[pos+1].type==='='){const k=adv().value;adv();fs.push({type:'name',key:k,value:parseExpr()});}else{fs.push({type:'value',value:parseExpr()});}if(!match(','))match(';');if(check('}'))break;}expect('}');return N('Table',fs);}

  const ast = parseBlock();
  expect('EOF');
  return ast;
}

// ── COMPILER ──
const OP = {LOADK:1,LOADNIL:2,LOADBOOL:3,GETGLOBAL:4,SETGLOBAL:5,GETLOCAL:6,SETLOCAL:7,GETTABLE:8,SETTABLE:9,GETFIELD:10,SETFIELD:11,ADD:12,SUB:13,MUL:14,DIV:15,MOD:16,POW:17,IDIV:18,UNM:19,NOT:20,LEN:21,CONCAT:22,EQ:23,LT:24,LE:25,JMP:26,JMPF:27,JMPT:28,CALL:29,RETURN:30,CLOSURE:31,NEWTABLE:32,SETLIST:33,FORPREP:34,FORLOOP:35,TFORLOOP:36,VARARG:37,SELF:38,POP:39,DUP:40,NOOP:41,BLOCK_JMP:42,BLOCK_JMPF:43,BLOCK_JMPT:44};

function newProto(){return{code:[],constants:[],protos:[],locals:[],params:0,has_vararg:false,_cmap:{},_lmap:{},_lslot:0,_breaks:[],_scope:[]};}

function compile(source) {
  const toks = tokenize(source);
  const ast = parse(toks);
  const C = {
    addConst(p,v){const k=typeof v+':'+v;if(p._cmap[k]!==undefined)return p._cmap[k];p.constants.push(v);const i=p.constants.length;p._cmap[k]=i;return i;},
    emit(p,op,a=0,b=0,c=0){p.code.push({op,a,b,c});return p.code.length;},
    pushScope(p){p._scope.push({locals:{},slot:p._lslot});},

// ── SERIALIZER ──
function serializeProto(proto) {
  const out = [];
  const ei = n => { n=Math.floor(n||0); out.push(n%256,(n>>8)%256,(n>>16)%256,(n>>24)%256&0xFF); };
  const eb = b => out.push(b&0xFF);
  const es = s => { s=s||''; ei(s.length); for(let i=0;i<s.length;i++)out.push(s.charCodeAt(i)&0xFF); };

  eb(proto.params);
  eb(proto.has_vararg?1:0);
  ei(proto.constants.length);
  for(const c of proto.constants){
    if(c===null||c===undefined){eb(0);}
    else if(typeof c==='boolean'){eb(1);eb(c?1:0);}
    else if(typeof c==='number'){
      if(Number.isInteger(c)&&Math.abs(c)<2147483647){
        // Sesi 8: obfuscate integer as XOR pair
        const nkey = Math.floor(Math.random()*0xFFFFFF)+1;
        const nval = ((c + 2147483648) ^ nkey) >>> 0;
        eb(6); // tag 6 = obfuscated int
        ei(nkey);
        ei(nval);
      }
      else{const s=c.toPrecision(10);eb(3);eb(s.length);for(let i=0;i<s.length;i++)out.push(s.charCodeAt(i));}
    }else if(typeof c==='string'){
      // Sesi 6: String encryption - tag=5, key, iv, encrypted bytes
      const skey=Math.floor(Math.random()*200)+10;
      const siv=Math.floor(Math.random()*200)+10;
      eb(5);eb(skey);eb(siv);
      const sbytes=[];
      for(let si=0;si<c.length;si++)sbytes.push(c.charCodeAt(si)&0xFF);
      ei(sbytes.length);
      let sk=skey,sv2=siv;
      for(let si=0;si<sbytes.length;si++){
        let sb=sbytes[si];
        sb=(sb+sk)%256;
        sb=sb^sv2;
        sb=(sb+(sk*sv2*(si+1))%256)%256;
        eb(sb);
        sk=(sk*7+13)%256;sv2=(sv2*11+17)%256;
      }
    }
  }
  // Serialize CFF blocks if present, otherwise normal code
  if(proto.cff_blocks && proto.cff_blocks.length > 0){
    // Mark as CFF: code length = 0xFFFF as sentinel
    ei(0xFFFF);
    // Entry block ID
    ei(proto.cff_entry || 0);
    // Number of blocks
    ei(proto.cff_blocks.length);
    for(const block of proto.cff_blocks){
      ei(block.id);
      ei(block.code.length);
      for(const ins of block.code){
        ei(ins.op);
        ei(ins.a+32768);
        ei(ins.b);
        ei(ins.c);
        // Extra: FORPREP/FORLOOP store cff IDs in B/C
        if(ins.op===OP.FORPREP){
          ei((ins.cff_skip||0)+32768);
          ei((ins.cff_body||0)+32768);
        } else if(ins.op===OP.FORLOOP){
          ei((ins.cff_body||0)+32768);
          ei((ins.cff_exit||0)+32768);
        }
      }
    }
  } else {
    ei(proto.code.length);
    for(const ins of proto.code){ei(ins.op);ei(ins.a+32768);ei(ins.b);ei(ins.c);}
  }
  ei(proto.protos.length);
  for(const sub of proto.protos){const sb=serializeProto(sub);ei(sb.length);for(const b of sb)out.push(b);}
  return out;
}

// ── SESI 7: CONTROL FLOW FLATTENING ──
// Scatters real instructions among junk instructions
// Makes linear disassembly impossible
function flattenBytecode(proto) {
  // Recursively flatten all protos
  flattenProto(proto);
  for(const sub of proto.protos) flattenBytecode(sub);
}

function flattenProto(proto) {
  if(proto.code.length === 0) return;
  const JUMP_OPS = new Set([OP.JMP, OP.JMPF, OP.JMPT, OP.FORPREP, OP.FORLOOP]);
  const orig = proto.code;
  const N = orig.length;

  // Compute junk counts and new positions for each original instruction
  const junkCounts = orig.map(() => Math.floor(Math.random()*2)+1);
  const origToNew = new Array(N); // 0-based orig → 0-based new position
  let pos = 0;
  for(let i=0;i<N;i++){
    pos += junkCounts[i];
    origToNew[i] = pos;
    pos++;
  }

  // Build new code array
  const newCode = [];
  for(let i=0;i<N;i++){
    for(let j=0;j<junkCounts[i];j++){
      newCode.push({op:OP.NOOP,a:0,b:Math.floor(Math.random()*256),c:0});
    }
    const ins = {...orig[i]};
    if(JUMP_OPS.has(ins.op)){
      // VM: after JMP, next pc = currentPC(1-based) + A
      // 0-based: target_orig = i + ins.a (where i is 0-based src)
      // new: A_new = origToNew[target_orig] - origToNew[i]
      const targetOrig = i + ins.a;
      if(targetOrig >= 0 && targetOrig < N){
        ins.a = origToNew[targetOrig] - origToNew[i];
      }
    }
    newCode.push(ins);
  }
  proto.code = newCode;
}

// ── ENCRYPTOR ──
function encrypt(bytes, k1, k2, k3) {
  const out=[];
  for(let i=0;i<bytes.length;i++){
    let b=bytes[i];
    b=(b+k1)%256;
    b=b^k2;
    b=(b+(k3*(i+1))%256)%256;
    out.push(b);
    k1=(k1*7+13)%256;k2=(k2*11+17)%256;k3=(k3*3+19)%256;
  }
  return out;
}

function rn(){const c='abcdefghijklmnopqrstuvwxyz';let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s+Math.floor(Math.random()*90+10);}

// ── MAIN PROTECT ──
// ── FULL CFF: BASIC BLOCK DISPATCH ──
function cffProto(proto) {
  const TERM_OPS = new Set([OP.JMP,OP.JMPF,OP.JMPT,OP.RETURN,OP.FORPREP,OP.FORLOOP]);
  const code = proto.code;
  if(code.length < 3) return; // too small to bother

  // Split into basic blocks
  const blocks = [];
  let cur = [], startIdx = 0;
  for(let i=0;i<code.length;i++){
    cur.push({...code[i], origIdx:i});
    if(TERM_OPS.has(code[i].op) || i===code.length-1){
      blocks.push({
        id: Math.floor(Math.random()*0xEFFF)+0x1000,
        startIdx, endIdx:i, code:cur
      });
      cur=[]; startIdx=i+1;
    }
  }
  if(blocks.length < 2) return; // not worth it

  // Map origIdx → blockIndex
  const origToBlock = {};
  for(let bi=0;bi<blocks.length;bi++)
    for(const ins of blocks[bi].code) origToBlock[ins.origIdx]=bi;

  // Convert jumps to block IDs
  for(let bi=0;bi<blocks.length;bi++){
    for(const ins of blocks[bi].code){
      if(ins.op===OP.JMP||ins.op===OP.JMPF||ins.op===OP.JMPT||
         ins.op===OP.FORPREP||ins.op===OP.FORLOOP){
        // target = origIdx + ins.a + 1 (next instruction logic)
        // For JMP: next pc = pc+A, so target = origIdx + ins.a (0-based)
        // In our VM: JMP→ pc=pc+A; so if pc(1-based)=origIdx+1, target(1-based)=origIdx+1+A
        // target(0-based) = origIdx + ins.a
        const targetOrig = ins.origIdx + ins.a;
        const targetBI = origToBlock[targetOrig];
        if(targetBI !== undefined){
          if(ins.op===OP.JMP)       { ins.op=OP.BLOCK_JMP;  ins.a=blocks[targetBI].id; }
          else if(ins.op===OP.JMPF) { ins.op=OP.BLOCK_JMPF; ins.a=blocks[targetBI].id; }
          else if(ins.op===OP.JMPT) { ins.op=OP.BLOCK_JMPT; ins.a=blocks[targetBI].id; }
          else if(ins.op===OP.FORPREP){
            // FORPREP: if skip → jump to targetBI, else continue to next block
            ins.cff_skip = blocks[targetBI].id;
            ins.cff_body = blocks[bi+1] ? blocks[bi+1].id : -1;
          }
          else if(ins.op===OP.FORLOOP){
            // FORLOOP: if continue → targetBI (loop body), else next block
            ins.cff_body = blocks[targetBI].id;
            ins.cff_exit = blocks[bi+1] ? blocks[bi+1].id : -1;
          }
        }
      }
    }
  }

  // Shuffle block order
  for(let i=blocks.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [blocks[i],blocks[j]]=[blocks[j],blocks[i]];
  }

  // Store entry block ID (block that originally starts at idx 0)
  const entryBlock = blocks.find(b=>b.startIdx===0);
  proto.cff_entry = entryBlock ? entryBlock.id : blocks[0].id;
  proto.cff_blocks = blocks;
  proto.code = []; // VM will use cff_blocks instead
}

function cffAll(proto) {
  cffProto(proto);
  for(const sub of proto.protos) cffAll(sub);
}


// ── SESI 11A: UPVALUE / LOCAL NAME SCRAMBLING ──
function scrambleNames(proto) {
  // Recursively scramble all local variable names
  for(const loc of proto.locals) {
    loc.name = rn(); // replace with random name
  }
  for(const param of (proto.params_list||[])) {
    // params are just count, not names in our impl - skip
  }
  for(const sub of proto.protos) scrambleNames(sub);
}

// ── SESI 11B: CONSTANT POOL PERMUTATION ──
function permuteConstants(proto) {
  if(proto.constants.length === 0) return;
  
  // Build random permutation
  const n = proto.constants.length;
  const perm = Array.from({length:n},(_,i)=>i); // [0,1,2,...,n-1]
  for(let i=n-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [perm[i],perm[j]]=[perm[j],perm[i]];
  }
  // perm[newIdx] = oldIdx
  // We need inverse: oldIdx -> newIdx
  const invPerm = new Array(n);
  for(let i=0;i<n;i++) invPerm[perm[i]] = i;
  
  // Reorder constants array
  const oldConsts = [...proto.constants];
  for(let i=0;i<n;i++) proto.constants[i] = oldConsts[perm[i]];
  
  // Update all instruction operands that reference constants (A field, 1-based)
  // LOADK, GETGLOBAL, SETGLOBAL, GETFIELD, SETFIELD, SELF use constant index in A
  const CONST_OPS = new Set([
    OP.LOADK, OP.GETGLOBAL, OP.SETGLOBAL,
    OP.GETFIELD, OP.SETFIELD, OP.SELF
  ]);
  for(const ins of proto.code){
    if(CONST_OPS.has(ins.op) && ins.a >= 1 && ins.a <= n){
      ins.a = invPerm[ins.a-1] + 1; // remap 1-based index
    }
  }
  
  // Recurse into sub-protos
  for(const sub of proto.protos) permuteConstants(sub);
}

// ── SESI 11C: DEAD CONSTANT INJECTION ──
function injectDeadConstants(proto) {
  // Add fake strings/numbers to constant pool
  // They look real but are never referenced
  const fakeStrings = [
    'game', 'workspace', 'Players', 'RunService', 'UserInputService',
    'ReplicatedStorage', 'ServerStorage', 'TweenService', 'HttpService',
    'DataStoreService', 'RemoteEvent', 'RemoteFunction', 'BindableEvent',
    'GetService', 'FindFirstChild', 'WaitForChild', 'Clone', 'Destroy',
    'Connect', 'Disconnect', 'FireServer', 'InvokeServer', 'FireClient'
  ];
  // Add 3-7 fake constants
  const count = Math.floor(Math.random()*5)+3;
  for(let i=0;i<count;i++){
    proto.constants.push(fakeStrings[Math.floor(Math.random()*fakeStrings.length)] + '_' + rn());
  }
  for(const sub of proto.protos) injectDeadConstants(sub);
}

// ── SESI 11D: B/C FIELD NOISE ──
function addOperandNoise(proto) {
  // B and C fields are unused in most instructions in our VM
  // Fill with random values to confuse static analysis
  const SKIP_OPS = new Set([OP.CALL, OP.TFORLOOP, OP.LOADBOOL]); // B is meaningful here
  for(const ins of proto.code){
    if(!SKIP_OPS.has(ins.op)){
      ins.b = Math.floor(Math.random()*256);
      // Don't touch C for now
    }
  }
  for(const sub of proto.protos) addOperandNoise(sub);
}



function protect(source) {
  const proto = compile(source);
  // Sesi 7: Basic junk (NOOP)
  flattenBytecode(proto);
  // Full CFF: basic block dispatch
  cffAll(proto);
  // Sesi 11: Upvalue/local name scrambling
  scrambleNames(proto);
  // Sesi 11: Constant pool permutation
  permuteConstants(proto);
  // Sesi 11: Dead constant injection
  injectDeadConstants(proto);
  // Sesi 11: Operand noise (disabled - B field needed for CALL)
  // addOperandNoise(proto);
  const bytes = serializeProto(proto);
  const k1 = Math.floor(Math.random()*190)+10;
  const k2 = Math.floor(Math.random()*190)+10;
  const k3 = Math.floor(Math.random()*190)+10;
  const enc = encrypt(bytes, k1, k2, k3);
  const innerLoader = buildLoader(enc, k1, k2, k3);
  
  // Sesi 10+12: Triple layer wrap
  const layer2 = wrapOuter(innerLoader);
  return wrapOuter3(layer2);
}

// ── SESI 12: THIRD WRAP LAYER ──
// Different cipher: additive with bit rotation
function wrapOuter3(luaCode) {
  const bytes = [];
  for(let i=0;i<luaCode.length;i++) bytes.push(luaCode.charCodeAt(i)&0xFF);
  
  const ok = Math.floor(Math.random()*200)+30;
  const enc = [];
  for(let i=0;i<bytes.length;i++){
    let b = bytes[i];
    // Additive cipher with position-dependent key
    b = (b + ok + i*3) % 256;
    enc.push(b);
  }
  
  const chunks=[];
  for(let i=0;i<enc.length;i+=80)chunks.push(enc.slice(i,i+80).join(','));
  
  const a=rn(),b2=rn(),c2=rn(),d=rn(),e=rn(),f=rn();
  
  // Fake Luraph-style header comment
  const fakeHeaders = [
    '-- Luraph Obfuscator v11.0.0 | https://lura.ph/',
    '-- IronBrew2 | Protected Script', 
    '-- Protected by Prometheus 3.0',
    '-- Obfuscated with Morpher v4',
    '-- Obfuscated with JAROT v1',
  ];
  const header = fakeHeaders[Math.floor(Math.random()*fakeHeaders.length)];
  
  // Size inflation: add random dead variable declarations
  // Makes static analysis harder and file look more complex
  const deadVars = [];
  const deadCount = Math.floor(Math.random()*15)+10;
  for(let i=0;i<deadCount;i++){
    const vn = rn();
    const vv = Math.floor(Math.random()*999999);
    deadVars.push(`local ${vn}=${vv}`);
  }
  const deadBlock = deadVars.join('\n');
  
  return [
    header,
    deadBlock,
    `local ${a}={${chunks.join(',')}}`,
    `local ${b2}=${ok}`,
    `local ${c2}={}`,
    `for ${d}=1,#${a} do`,
    `  ${c2}[${d}]=(${a}[${d}]-${b2}-((${d}-1)*3))%256`,
    `end`,
    `local ${e}=""`,
    `for ${d}=1,#${c2} do ${e}=${e}..string.char(${c2}[${d}])end`,
    `local ${f},_=loadstring(${e})`,
    `if ${f} then ${f}() else warn(tostring(_))end`,
  ].join(String.fromCharCode(10));
}


function wrapOuter(luaCode) {
  // Convert lua string to bytes
  const bytes = [];
  for(let i=0;i<luaCode.length;i++) bytes.push(luaCode.charCodeAt(i)&0xFF);
  
  // Simple rolling XOR with 2 keys
  const ok1 = Math.floor(Math.random()*200)+10;
  const ok2 = Math.floor(Math.random()*200)+10;
  const enc = [];
  let k1=ok1, k2=ok2;
  for(let i=0;i<bytes.length;i++){
    let b=bytes[i];
    b=(b+k1)%256;
    b=b^k2;
    enc.push(b);
    k1=(k1*13+7)%256;
    k2=(k2*17+11)%256;
  }
  
  // Chunk encrypted bytes
  const chunks=[];
  for(let i=0;i<enc.length;i+=80)chunks.push(enc.slice(i,i+80).join(','));
  
  // Random var names for outer layer
  const ov1=rn(),ov2=rn(),ov3=rn(),ov4=rn(),ov5=rn(),ov6=rn(),ov7=rn();
  
  return [
    '-- [JAROT PROTECTED v2]',
    `local ${ov1}={${chunks.join(',')}}`,
    `local ${ov2},${ov3}=${ok1},${ok2}`,
    `local ${ov4}={}`,
    `for ${ov5}=1,#${ov1} do`,
    `  local ${ov6}=${ov1}[${ov5}]`,
    `  ${ov6}=bit32.bxor(${ov6},${ov3})`,
    `  ${ov6}=(${ov6}-${ov2}+256)%256`,
    `  ${ov4}[${ov5}]=${ov6}`,
    `  ${ov2}=(${ov2}*13+7)%256;${ov3}=(${ov3}*17+11)%256`,
    `end`,
    `local ${ov7}=""`,
    `for ${ov5}=1,#${ov4} do ${ov7}=${ov7}..string.char(${ov4}[${ov5}])end`,
    `local _f,_e=loadstring(${ov7})`,
    `if _f then _f() else warn(tostring(_e)) end`,
  ].join(String.fromCharCode(10));
}
