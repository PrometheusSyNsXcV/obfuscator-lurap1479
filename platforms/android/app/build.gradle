apply plugin: 'com.android.application'
android {
    namespace 'com.byjarot.app'; compileSdkVersion 34
    defaultConfig {
        applicationId 'com.byjarot.app'; minSdkVersion 21; targetSdkVersion 34
        versionCode 10000; versionName '1.0.0'; multiDexEnabled true
    }
    dexOptions { javaMaxHeapSize '2048m' }
    lintOptions { abortOnError false }
    buildTypes {
        debug { debuggable true }
        release { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.webkit:webkit:1.8.0'
    implementation 'com.google.android.material:material:1.10.0'
}