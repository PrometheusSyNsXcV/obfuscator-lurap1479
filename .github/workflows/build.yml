name: Build HTML APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Gradle Wrapper
        run: |
          mkdir -p platforms/android/gradle/wrapper
          curl -sL -o platforms/android/gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar || true
          printf "#!/bin/sh\nexec \"$JAVA_HOME/bin/java\" -jar \"$(pwd)/platforms/android/gradle/wrapper/gradle-wrapper.jar\" \"$@\"" > platforms/android/gradlew
          chmod +x platforms/android/gradlew
      - name: Build APK
        working-directory: platforms/android
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: download-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30